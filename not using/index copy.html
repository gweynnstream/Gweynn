<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Reset body */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #000;
      text-align: center;
      padding-bottom: 200px; /* extra space at the bottom for scrolling */
    }

    /* Portrait photo, fully visible */
    .profile-photo {
      width: 200px;       
      height: auto;       
      border-radius: 0;   
      margin-bottom: 50px; 
    }

    /* Page heading (currently blank) */
    h1 {
      font-size: 64px;
      font-weight: 700;
      margin: 0 0 50px 0;
      line-height: 1.2;
    }

    /* Vertical menu links */
    .menu {
      display: flex;
      flex-direction: column; 
      gap: 30px;              /* slightly reduced gap for smaller text */
      align-items: center;
    }

    .menu a {
      text-decoration: none;
      font-size: 24px;      /* smaller, cleaner */
      font-weight: 500;
      color: #000;
      transition: color 0.3s ease;
    }

    .menu a:hover {
      color: #555; 
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .profile-photo {
        width: 150px;
        height: auto;
        margin-bottom: 30px;
      }
      h1 { font-size: 40px; margin-bottom: 30px; }
      .menu a { font-size: 20px; gap: 25px; }
    }
  </style>
</head>
<body>

  <!-- Portrait Photo -->
  <img src="g2.jpg" alt="My Photo" class="profile-photo">

  <!-- Page Heading (currently blank) -->
  <h1></h1>

  <!-- Vertical Menu Links -->
  <div class="menu">
    <a href="info.html">info</a>
    <a href="dates.html">dates</a>
    <a href="works.html">work</a>
    <a href="contact.html">contact</a>
  </div>

</body>
</html>
